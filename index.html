<style>
/* ===== Reset & Base ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg-primary: #0d1117;
  --bg-secondary: #161b22;
  --bg-card: rgba(22, 27, 34, 0.85);
  --border: #30363d;
  --text-primary: #e6edf3;
  --text-secondary: #8b949e;
  --gold: #f0c060;
  --silver: #b0b8c4;
  --bronze: #d4946a;
  --accent-pts: #f0a500;
  --accent-reb: #4dabf7;
  --accent-ast: #38d9a9;
  --accent-stl: #9775fa;
  --accent-blk: #ff6b6b;
  --glass-bg: rgba(255, 255, 255, 0.03);
  --glass-border: rgba(255, 255, 255, 0.08);
  --shadow: 0 4px 24px rgba(0, 0, 0, 0.3);
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  min-height: 100vh;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

/* Subtle grid background */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
  background-size: 60px 60px;
  pointer-events: none;
  z-index: 0;
}

/* ===== Layout ===== */
.page-wrapper {
  position: relative;
  z-index: 1;
  max-width: 1320px;
  margin: 0 auto;
  padding: 0 24px;
}

/* ===== Header ===== */
.header {
  text-align: center;
  padding: 48px 0 0;
}

.header-icon {
  font-size: 48px;
  margin-bottom: 8px;
}

.header h1 {
  font-size: 2rem;
  font-weight: 700;
  letter-spacing: -0.02em;
  background: linear-gradient(135deg, #e6edf3 0%, #8b949e 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.header .subtitle {
  color: var(--text-secondary);
  font-size: 0.9rem;
  margin-top: 4px;
  letter-spacing: 0.05em;
}

.header .divider {
  width: 60px;
  height: 3px;
  margin: 20px auto 0;
  border-radius: 2px;
  background: linear-gradient(90deg, var(--accent-pts), var(--accent-reb), var(--accent-ast), var(--accent-stl), var(--accent-blk));
}

/* ===== Tab Navigation ===== */
.tab-nav {
  display: flex;
  justify-content: center;
  gap: 4px;
  margin: 36px 0 32px;
  background: var(--bg-secondary);
  border-radius: 14px;
  padding: 6px;
  border: 1px solid var(--border);
  flex-wrap: wrap;
}

.tab-btn {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 22px;
  border-radius: 10px;
  border: none;
  background: transparent;
  color: var(--text-secondary);
  font-size: 0.9rem;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.25s ease;
  font-family: inherit;
  white-space: nowrap;
}

.tab-btn:hover {
  color: var(--text-primary);
  background: rgba(255,255,255,0.04);
}

.tab-btn.active {
  background: rgba(255,255,255,0.08);
  color: var(--text-primary);
  font-weight: 600;
}

.tab-btn .tab-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}

.tab-dot.pts { background: var(--accent-pts); }
.tab-dot.reb { background: var(--accent-reb); }
.tab-dot.ast { background: var(--accent-ast); }
.tab-dot.stl { background: var(--accent-stl); }
.tab-dot.blk { background: var(--accent-blk); }

/* ===== Category Section ===== */
.category {
  display: none;
  animation: fadeSlideIn 0.4s ease;
}

.category.active {
  display: block;
}

@keyframes fadeSlideIn {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}

.category-header {
  display: flex;
  align-items: baseline;
  gap: 12px;
  margin-bottom: 24px;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--border);
}

.category-header h2 {
  font-size: 1.35rem;
  font-weight: 700;
}

.category-header .count {
  font-size: 0.85rem;
  color: var(--text-secondary);
}

/* ===== Player Card Grid ===== */
.player-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 14px;
}

/* ===== Player Card ===== */
.player-card {
  position: relative;
  background: var(--glass-bg);
  border: 1px solid var(--glass-border);
  border-radius: 14px;
  padding: 18px 12px 14px;
  text-align: center;
  cursor: pointer;
  transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
}

.player-card:hover {
  transform: translateY(-6px);
  box-shadow: 0 12px 32px rgba(0,0,0,0.4);
  border-color: rgba(255,255,255,0.2);
}

/* 排名勋章 */
.rank-badge {
  position: absolute;
  top: -8px;
  left: -6px;
  width: 32px;
  height: 32px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.75rem;
  font-weight: 700;
  color: #0d1117;
  box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  z-index: 2;
}

.rank-1 { background: linear-gradient(135deg, #f7d774, #e2a83b); }
.rank-2 { background: linear-gradient(135deg, #d1d5db, #9ca3af); }
.rank-3 { background: linear-gradient(135deg, #e4a87a, #c0703c); }
.rank-other { background: #30363d; color: var(--text-secondary); }

/* 卡片勋章金/银/铜边框 */
.player-card.medal-gold   { border-color: rgba(240,192,96,0.5); }
.player-card.medal-silver { border-color: rgba(176,184,196,0.4); }
.player-card.medal-bronze { border-color: rgba(212,148,106,0.4); }

/* 头像 */
.player-headshot {
  width: 72px;
  height: 72px;
  border-radius: 50%;
  object-fit: cover;
  background: #21262d;
  margin: 0 auto 10px;
  display: block;
  border: 2px solid rgba(255,255,255,0.1);
  transition: border-color 0.3s;
}

.player-card:hover .player-headshot {
  border-color: rgba(255,255,255,0.3);
}

/* 头像加载失败时显示占位 */
.headshot-placeholder {
  width: 72px;
  height: 72px;
  border-radius: 50%;
  margin: 0 auto 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(135deg, #1f2937, #374151);
  border: 2px solid rgba(255,255,255,0.1);
  font-size: 28px;
  color: var(--text-secondary);
}

.player-name {
  font-size: 0.9rem;
  font-weight: 600;
  margin-bottom: 2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.player-team {
  font-size: 0.75rem;
  color: var(--text-secondary);
  margin-bottom: 8px;
}

.player-stat {
  font-size: 2rem;
  font-weight: 800;
  letter-spacing: -0.03em;
  line-height: 1;
}

.player-stat-label {
  font-size: 0.7rem;
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-top: 2px;
}

/* category accent color on stat */
.pts-accent .player-stat { color: var(--accent-pts); }
.reb-accent .player-stat { color: var(--accent-reb); }
.ast-accent .player-stat { color: var(--accent-ast); }
.stl-accent .player-stat { color: var(--accent-stl); }
.blk-accent .player-stat { color: var(--accent-blk); }

/* ===== Modal ===== */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  z-index: 100;
  align-items: center;
  justify-content: center;
  animation: fadeIn 0.2s ease;
}

.modal-overlay.show {
  display: flex;
}

@keyframes fadeIn {
  from { opacity: 0; }
  to   { opacity: 1; }
}

.modal {
  background: #161b22;
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 0;
  max-width: 480px;
  width: 90%;
  box-shadow: 0 24px 80px rgba(0,0,0,0.6);
  animation: modalPop 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  overflow: hidden;
}

@keyframes modalPop {
  from { transform: scale(0.9); opacity: 0; }
  to   { transform: scale(1); opacity: 1; }
}

.modal-header {
  display: flex;
  align-items: center;
  gap: 20px;
  padding: 28px 28px 20px;
  border-bottom: 1px solid var(--border);
  background: rgba(255,255,255,0.015);
}

.modal-headshot {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  object-fit: cover;
  border: 3px solid rgba(255,255,255,0.15);
  flex-shrink: 0;
}

.modal-headshot-placeholder {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(135deg, #1f2937, #374151);
  border: 3px solid rgba(255,255,255,0.15);
  font-size: 32px;
}

.modal-player-info h3 {
  font-size: 1.3rem;
  font-weight: 700;
}

.modal-player-info .modal-team {
  color: var(--text-secondary);
  font-size: 0.85rem;
}

.modal-close {
  margin-left: auto;
  align-self: flex-start;
  width: 32px;
  height: 32px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-secondary);
  cursor: pointer;
  font-size: 1rem;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
  flex-shrink: 0;
}

.modal-close:hover {
  background: rgba(255,255,255,0.08);
  color: var(--text-primary);
}

.modal-body {
  padding: 24px 28px 28px;
}

/* Stat table inside modal */
.stat-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
}

.stat-item {
  text-align: center;
  padding: 14px 8px;
  background: rgba(255,255,255,0.02);
  border-radius: 10px;
  border: 1px solid rgba(255,255,255,0.05);
}

.stat-item .val {
  font-size: 1.6rem;
  font-weight: 800;
  letter-spacing: -0.02em;
}

.stat-item .lbl {
  font-size: 0.7rem;
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-top: 2px;
}

.val.pts-c { color: var(--accent-pts); }
.val.reb-c { color: var(--accent-reb); }
.val.ast-c { color: var(--accent-ast); }
.val.stl-c { color: var(--accent-stl); }
.val.blk-c { color: var(--accent-blk); }
.val.pct  { color: #e6edf3; }

/* ===== Footer ===== */
.footer {
  text-align: center;
  padding: 40px 0 32px;
  color: var(--text-secondary);
  font-size: 0.75rem;
}

.footer a {
  color: var(--text-secondary);
  text-decoration: underline;
  text-underline-offset: 2px;
}

/* ===== Responsive ===== */
@media (max-width: 1100px) {
  .player-grid { grid-template-columns: repeat(4, 1fr); }
}

@media (max-width: 800px) {
  .player-grid { grid-template-columns: repeat(3, 1fr); }
  .tab-btn { padding: 8px 14px; font-size: 0.82rem; }
  .header h1 { font-size: 1.5rem; }
  .player-stat { font-size: 1.6rem; }
}

@media (max-width: 540px) {
  .player-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
  .tab-btn { padding: 7px 10px; font-size: 0.76rem; gap: 4px; }
  .player-card { padding: 14px 8px 10px; }
  .player-headshot { width: 56px; height: 56px; }
  .player-stat { font-size: 1.4rem; }
  .modal { width: 95%; }
  .stat-grid { grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .modal-body { padding: 16px; }
  .modal-header { padding: 20px 16px 16px; gap: 12px; }
  .modal-headshot { width: 60px; height: 60px; }
}
</style>
</head>

// ======================================================================
// RANKINGS — Top 10 per category (player IDs in order)
// ======================================================================
const rankings = {
  pts: ["1629029","1628983","1630162","1627759","1630178","1628378","202695","203999","203507","201142"],
  reb: ["203999","1626157","1642270","1629028","1641705","203497","1631105","1631117","1627734","203076"],
  ast: ["203999","1630595","1629027","1630169","1629029","201935","2544","1629636","1630552","1628378"],
  stl: ["1641709","1630700","1628983","1630178","202695","1641717","1629029","203999","1641708","1630529"],
  blk: ["1641705","1631117","1631096","203497","1631105","1641744","1628991","203076","1642270","1630596"]
};

const categoryMeta = {
  pts: { label: "得分",    unit: "PPG",  icon: "🔥", accentClass: "pts-accent", colorVar: "var(--accent-pts)" },
  reb: { label: "篮板",    unit: "RPG",  icon: "🛡️", accentClass: "reb-accent", colorVar: "var(--accent-reb)" },
  ast: { label: "助攻",    unit: "APG",  icon: "🎯", accentClass: "ast-accent", colorVar: "var(--accent-ast)" },
  stl: { label: "抢断",    unit: "SPG",  icon: "⚡", accentClass: "stl-accent", colorVar: "var(--accent-stl)" },
  blk: { label: "盖帽",    unit: "BPG",  icon: "🖐️", accentClass: "blk-accent", colorVar: "var(--accent-blk)" }
};

const catKeys = ['pts','reb','ast','stl','blk'];
const catToProp = { pts: 'ppg', reb: 'rpg', ast: 'apg', stl: 'spg', blk: 'bpg' };

// ======================================================================
// Render Functions
// ======================================================================
function getHeadshotURL(playerId) {
  return `https://cdn.nba.com/headshots/nba/latest/260x190/${playerId}.png`;
}

function getMedalClass(rank) {
  if (rank === 0) return 'medal-gold';
  if (rank === 1) return 'medal-silver';
  if (rank === 2) return 'medal-bronze';
  return '';
}

function getRankBadgeClass(rank) {
  if (rank === 0) return 'rank-1';
  if (rank === 1) return 'rank-2';
  if (rank === 2) return 'rank-3';
  return 'rank-other';
}

function createPlayerCard(playerId, rank, catKey) {
  const p = playerDB[playerId];
  if (!p) return '';

  const meta = categoryMeta[catKey];
  const statVal = p[catToProp[catKey]];
  const medalClass = getMedalClass(rank);
  const badgeClass = getRankBadgeClass(rank);
  const rankDisplay = rank + 1;

  return `
    <div class="player-card ${medalClass} ${meta.accentClass}"
         onclick="openPlayerModal('${playerId}')"
         title="点击查看 ${p.name} 完整数据">
      <div class="rank-badge ${badgeClass}">${rankDisplay}</div>
      <img class="player-headshot"
           src="${getHeadshotURL(playerId)}"
           alt="${p.name}"
           loading="lazy"
           onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">
      <div class="headshot-placeholder" style="display:none;">🏀</div>
      <div class="player-name">${p.name}</div>
      <div class="player-team">${p.team}</div>
      <div class="player-stat">${statVal.toFixed(1)}</div>
      <div class="player-stat-label">${meta.unit}</div>
    </div>
  `;
}

function renderCategory(catKey) {
  const meta = categoryMeta[catKey];
  const playerIds = rankings[catKey];
  let html = '';

  html += `<section class="category active" id="cat-${catKey}">`;
  html += `<div class="category-header">`;
  html += `<h2>${meta.icon} ${meta.label}排行榜 · TOP 10</h2>`;
  html += `<span class="count">场均${meta.label} | 至少出赛58场</span>`;
  html += `</div>`;
  html += `<div class="player-grid">`;

  playerIds.forEach((pid, idx) => {
    html += createPlayerCard(pid, idx, catKey);
  });

  html += `</div></section>`;
  return html;
}

function renderAllCategories() {
  const main = document.getElementById('mainContent');
  main.innerHTML = catKeys.map(k => renderCategory(k)).join('');
  // Show only first category initially
  switchCategory('pts');
}

// ======================================================================
// Tab Switching
// ======================================================================
function switchCategory(catKey) {
  // Update tabs
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.cat === catKey);
  });
  // Show/hide sections
  document.querySelectorAll('.category').forEach(sec => {
    sec.classList.toggle('active', sec.id === `cat-${catKey}`);
  });
}

document.getElementById('tabNav').addEventListener('click', (e) => {
  const btn = e.target.closest('.tab-btn');
  if (!btn) return;
  switchCategory(btn.dataset.cat);
});

// ======================================================================
// Modal — Player Detail
// ======================================================================
function openPlayerModal(playerId) {
  const p = playerDB[playerId];
  if (!p) return;

  document.getElementById('modalHeadshot').src = getHeadshotURL(playerId);
  document.getElementById('modalHeadshot').style.display = 'block';
  document.getElementById('modalHeadshotPlaceholder').style.display = 'none';
  document.getElementById('modalName').textContent = p.name;
  document.getElementById('modalTeam').textContent = `${p.team} · ${p.pos}`;

  const statsHTML = `
    <div class="stat-item"><div class="val pts-c">${p.ppg.toFixed(1)}</div><div class="lbl">得分 PPG</div></div>
    <div class="stat-item"><div class="val reb-c">${p.rpg.toFixed(1)}</div><div class="lbl">篮板 RPG</div></div>
    <div class="stat-item"><div class="val ast-c">${p.apg.toFixed(1)}</div><div class="lbl">助攻 APG</div></div>
    <div class="stat-item"><div class="val stl-c">${p.spg.toFixed(1)}</div><div class="lbl">抢断 SPG</div></div>
    <div class="stat-item"><div class="val blk-c">${p.bpg.toFixed(1)}</div><div class="lbl">盖帽 BPG</div></div>
    <div class="stat-item"><div class="val pct">${p.mpg.toFixed(1)}</div><div class="lbl">分钟 MPG</div></div>
    <div class="stat-item"><div class="val pct">${p.fgPct.toFixed(1)}%</div><div class="lbl">命中率 FG%</div></div>
    <div class="stat-item"><div class="val pct">${p.threePct.toFixed(1)}%</div><div class="lbl">三分 3P%</div></div>
    <div class="stat-item"><div class="val pct">${p.ftPct.toFixed(1)}%</div><div class="lbl">罚球 FT%</div></div>
  `;

  document.getElementById('modalStats').innerHTML = statsHTML;
  document.getElementById('modalOverlay').classList.add('show');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('show');
  document.body.style.overflow = '';
}

document.getElementById('modalClose').addEventListener('click', closeModal);
document.getElementById('modalOverlay').addEventListener('click', (e) => {
  if (e.target === document.getElementById('modalOverlay')) {
    closeModal();
  }
});

// Keyboard: ESC to close
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeModal();
});

// ======================================================================
// Init
// ======================================================================
renderAllCategories();
</script>
